server.port: 8084
spring:
  application.name: interaction-service
  datasource:
    url: ${INTERACTION_DB_URL:jdbc:postgresql://localhost:5432/interaction_db}
    username: ${POSTGRES_USER:blog}
    password: ${POSTGRES_PASSWORD:blog}
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
  flyway.enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: interaction-service
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
management:
  endpoints.web.exposure.include: health,info,prometheus
  endpoint.health.probes.enabled: true
app:
  security.jwt-secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-bytes}
  kafka:
    consumer-enabled: ${KAFKA_CONSUMER_ENABLED:true}
    retry:
      backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}
      max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
  outbox:
    publisher-enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    fixed-delay-ms: 1000
    batch-size: 50
    max-attempts: 10
    topic: interactions.events
