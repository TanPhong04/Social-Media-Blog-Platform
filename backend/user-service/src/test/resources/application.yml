spring:
  datasource:
    url: jdbc:h2:mem:userdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
app:
  outbox:
    publisher-enabled: false
  security:
    jwt:
      issuer: https://social-blog-platform.test
      key-id: local-test-rsa
    access-token-minutes: 15
    refresh-token-days: 30
