server.port: 8085
spring:
  application.name: follower-service
  datasource:
    url: ${FOLLOWER_DB_URL:jdbc:postgresql://localhost:5432/follower_db}
    username: ${POSTGRES_USER:blog}
    password: ${POSTGRES_PASSWORD:blog}
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
  flyway.enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: follower-service
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
management:
  endpoints.web.exposure.include: health,info,prometheus
  endpoint.health.probes.enabled: true
logging:
  structured.format.console: ecs
app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:https://social-blog-platform.local}
      public-key: ${JWT_PUBLIC_KEY:}
      jwk-set-uri: ${JWT_JWK_SET_URI:}
  kafka:
    consumer-enabled: ${KAFKA_CONSUMER_ENABLED:true}
    retry:
      backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}
      max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
  outbox:
    publisher-enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    fixed-delay-ms: 1000
    batch-size: 50
    max-attempts: 10
    topic: followers.events
