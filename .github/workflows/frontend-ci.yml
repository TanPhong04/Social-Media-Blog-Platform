name: Frontend CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Web
        run: flutter build web --release --dart-define=ENV=prod

      - name: Build Android APK
        run: flutter build apk --release --dart-define=ENV=prod

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
